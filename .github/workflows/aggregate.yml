name: Agregador de noticias

on:
  schedule:
    # Cada 2 horas (UTC).
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias Python
        run: pip install -r scripts/requirements.txt

      - name: Instalar dependencias Node
        run: npm ci

      - name: Correr agregador
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/aggregator.py --verbose

      - name: Commit y push de nuevas noticias
        run: |
          git config user.name "automatizacion-latam-bot"
          git config user.email "bot@automatizacionslatam.com"
          git add src/content/noticias/ scripts/state/processed.json
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que commitear."
          else
            COUNT=$(git diff --staged --name-only -- 'src/content/noticias/*.md' | wc -l)
            git commit -m "auto: publicar $COUNT noticia(s)"
            git push
          fi

      - name: Build sitio estático
        run: npm run build
        env:
          SITE_URL: https://automatizacionslatam.com
          PUBLIC_ADSENSE_CLIENT: ${{ secrets.PUBLIC_ADSENSE_CLIENT }}

      - name: Deploy a Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # Wrangler 4 soporta deploys con solo "assets" (sitios estaticos
          # puros). La v3 que la action instala por defecto exige un main
          # worker y falla con "Missing entry-point".
          wranglerVersion: "4"
