name: Agregador de noticias

on:
  schedule:
    # Cada 2 horas (UTC).
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias Python
        run: pip install -r scripts/requirements.txt

      - name: Instalar dependencias Node
        run: npm ci

      - name: Correr agregador
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: https://automatizacionslatam.com
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python scripts/aggregator.py --verbose

      - name: Commit y push de nuevas noticias
        run: |
          git config user.name "automatizacion-latam-bot"
          git config user.email "bot@automatizacionslatam.com"
          git add src/content/noticias/ scripts/state/processed.json
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que commitear."
          else
            COUNT=$(git diff --staged --name-only -- 'src/content/noticias/*.md' | wc -l)
            git commit -m "auto: publicar $COUNT noticia(s)"
            git push
          fi

      - name: Build sitio estático
        run: npm run build
        env:
          SITE_URL: https://automatizacionslatam.com
          PUBLIC_ADSENSE_CLIENT: ${{ secrets.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.PUBLIC_GOOGLE_SITE_VERIFICATION }}
          PUBLIC_BING_VERIFICATION: ${{ secrets.PUBLIC_BING_VERIFICATION }}
          PUBLIC_YANDEX_VERIFICATION: ${{ secrets.PUBLIC_YANDEX_VERIFICATION }}

      - name: Validar que PUBLIC_ADSENSE_CLIENT este presente en dist/index.html antes de deploy
        # Falla ruidosamente si el build no produjo AdSense en el HTML. Evita
        # que un secret mal configurado en CI sobreescriba produccion sin AdSense.
        run: |
          if ! grep -q "ca-pub-" dist/index.html; then
            echo "::error::dist/index.html NO contiene ca-pub-. El build se hizo sin PUBLIC_ADSENSE_CLIENT. Abortando deploy para no romper monetizacion."
            echo "Verifica que el secret PUBLIC_ADSENSE_CLIENT este definido y tenga el valor 'ca-pub-XXXXXXXXXXXXXXXX'."
            exit 1
          fi
          echo "::notice::AdSense (ca-pub-) confirmado en dist/index.html — listo para deploy."

      - name: Deploy a Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # Wrangler 4 soporta deploys con solo "assets" (sitios estaticos
          # puros). La v3 que la action instala por defecto exige un main
          # worker y falla con "Missing entry-point".
          wranglerVersion: "4"

      - name: Healthcheck post-deploy — verificar AdSense en produccion
        # Verifica que el deploy sirve AdSense correctamente. Consulta el
        # *Worker URL directo* (no el custom domain) para bypass del CDN cache
        # de Cloudflare, que puede devolver una version vieja durante hasta
        # 10 minutos (max-age=600 en public/_headers para HTML).
        #
        # Tambien verifica el custom domain como informativo (no falla si
        # el cache aun sirve la vieja — eso se purga solo).
        run: |
          WORKER_URL="https://automatizacion-latam-web.jesusdavidquinterofontalvo.workers.dev"
          PUBLIC_URL="https://automatizacionslatam.com"
          UA="AdsBot-Google (+http://www.google.com/adsbot.html)"

          echo "Esperando 10s para que el Worker propague el deploy..."
          sleep 10

          for attempt in 1 2 3 4 5; do
            echo "Intento $attempt sobre Worker URL directo..."
            HTML=$(curl -s -A "$UA" "$WORKER_URL/?hc=$(date +%s)$RANDOM")
            SIZE=$(echo -n "$HTML" | wc -c)
            HAS_ADS=$(echo "$HTML" | grep -c "ca-pub-" || true)
            echo "  Worker: ${SIZE} bytes, ca-pub matches: ${HAS_ADS}"
            if [ "$HAS_ADS" -gt 0 ]; then
              echo "::notice::Healthcheck OK — el Worker sirve AdSense correctamente (intento $attempt)."
              # Adicional: check informativo sobre el dominio publico
              PUB=$(curl -s -A "$UA" "$PUBLIC_URL/?hc=$(date +%s)$RANDOM" | grep -c "ca-pub-" || true)
              if [ "$PUB" -gt 0 ]; then
                echo "::notice::Custom domain tambien sirve AdSense (CF cache propagado)."
              else
                echo "::warning::Custom domain todavia sirve cache anterior. Se propaga solo en <10 min."
              fi
              exit 0
            fi
            echo "::warning::Intento $attempt: el Worker no muestra ca-pub-. Reintentando en 15s..."
            sleep 15
          done
          echo "::error::Healthcheck FALLO. El Worker NO sirve AdSense despues del deploy. Esto rompe la monetizacion."
          echo "::error::Revisar logs del paso 'Build sitio estatico' (que PUBLIC_ADSENSE_CLIENT este poblado) y del paso 'Deploy a Cloudflare Workers'."
          exit 1
