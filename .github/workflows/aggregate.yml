name: Agregador de noticias

on:
  schedule:
    # Cada 2 horas (UTC). Ajusta a tu gusto.
    - cron: "0 */2 * * *"
  workflow_dispatch:  # permite ejecutarlo manualmente desde la UI de GitHub

permissions:
  contents: write  # necesario para que el bot commitee los .md generados

concurrency:
  group: aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesario para hacer commit con el GITHUB_TOKEN por defecto
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Correr agregador
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/aggregator.py --verbose

      - name: Commit y push de nuevas noticias
        run: |
          git config user.name "automatizacion-latam-bot"
          git config user.email "bot@automatizacionlatam.com"
          git add src/content/noticias/ scripts/state/processed.json
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que commitear."
          else
            COUNT=$(git diff --staged --name-only -- 'src/content/noticias/*.md' | wc -l)
            git commit -m "auto: publicar $COUNT noticia(s) [skip ci]"
            git push
          fi
