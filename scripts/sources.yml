# Fuentes RSS del agregador.
# Para añadir una fuente: averigua la URL de su feed (busca <link rel="alternate"
# type="application/rss+xml"> en el HTML) y agrégala con el formato siguiente.
#
# Campos:
#   nombre   — Nombre legible que aparece como "Fuente: X" en el sitio.
#   url      — URL del feed RSS o Atom.
#   peso     — 1 a 5. Influye en cuántas noticias se toman por run (más peso = más noticias).
#   activa   — true/false. Permite desactivar temporalmente sin borrar.

fuentes:
  # === FUENTES VERIFICADAS Y FUNCIONANDO (mayo 2026) ===
  - nombre: "Schneider Electric Blog"
    url: "https://blog.se.com/feed/"
    peso: 4
    activa: true

  - nombre: "IIoT World"
    url: "https://www.iiot-world.com/feed/"
    peso: 4
    activa: true

  - nombre: "Industrial Cyber"
    url: "https://industrialcyber.co/feed/"
    peso: 5
    activa: true

  - nombre: "Plant Engineering"
    url: "https://www.plantengineering.com/feed/"
    peso: 4
    activa: true

  # --- Fuentes en español (preferentes para SEO LatAm) ---
  - nombre: "Tecnoplc"
    url: "https://tecnoplc.com/feed/"
    peso: 5
    activa: true  # Blog tecnico de PLC en español (España) — verificado mayo 2026

  - nombre: "Logicbus"
    url: "https://www.logicbus.com.mx/blog/feed/"
    peso: 5
    activa: true  # Automatización y robótica en español (México) — verificado mayo 2026

  - nombre: "Industrial Ethernet Book"
    url: "http://industrialethernet.net/feed/"
    peso: 3
    activa: false  # Feed devolvió 0 items en dry-run (mayo 2026) — pendiente verificar URL correcta

  # === FUENTES DE INTELIGENCIA ARTIFICIAL ===
  # Cubren modelos generativos, agentes, video/imagen IA, LLMs, plataformas.
  # Verificadas mayo 2026.

  - nombre: "Hipertextual"
    url: "https://hipertextual.com/feed"
    peso: 5
    activa: false  # Desactivada (19-may-2026): feed generalista trae cine/series/cultura. Cubrimos español con Xataka, Tecnoplc, Logicbus.

  - nombre: "OpenAI Blog"
    url: "https://openai.com/news/rss.xml"
    peso: 5
    activa: true  # Anuncios oficiales de OpenAI (GPT, DALL·E, Sora)

  - nombre: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
    peso: 5
    activa: true  # Gemini, DeepMind, Veo, Imagen

  - nombre: "MIT Technology Review"
    url: "https://www.technologyreview.com/feed/"
    peso: 5
    activa: true  # Análisis profundo IA, política y ética

  - nombre: "MIT News — AI"
    url: "https://news.mit.edu/topic/mitartificial-intelligence2-rss.xml"
    peso: 4
    activa: true  # Investigación académica en IA

  - nombre: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    peso: 4
    activa: true  # Modelos open-source, tutoriales técnicos

  - nombre: "MarkTechPost"
    url: "https://www.marktechpost.com/feed/"
    peso: 4
    activa: true  # Papers, releases de modelos, tutoriales

  - nombre: "VentureBeat AI"
    url: "https://venturebeat.com/category/ai/feed/"
    peso: 4
    activa: true  # IA empresarial y startups

  - nombre: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    peso: 4
    activa: true  # Funding, M&A, lanzamientos IA

  # === FUENTES INDUSTRIALES ADICIONALES (mayo 2026) ===

  - nombre: "Manufacturing Tomorrow"
    url: "https://www.manufacturingtomorrow.com/rss/news.xml"
    peso: 4
    activa: true  # Manufactura, IIoT, automatización — verificado

  - nombre: "Design World Online"
    url: "https://www.designworldonline.com/feed/"
    peso: 4
    activa: true  # Ingeniería de diseño, motion control — verificado

  - nombre: "Electronics Weekly"
    url: "https://www.electronicsweekly.com/feed/"
    peso: 3
    activa: true  # Componentes, semiconductores, automatización electrónica

  - nombre: "Xataka - Automatización"
    url: "https://www.xataka.com/tag/automatizacion/rss2.xml"
    peso: 5
    activa: true  # ESPAÑOL — tag específico automatización (prioridad SEO LatAm)

  # === FUENTES POR VERIFICAR — la URL del feed devolvió HTML/captcha ===
  # Para reactivarlas, busca la URL correcta del feed en el HTML del sitio
  # (View Source y busca `application/rss+xml`) y prueba con:
  #   py scripts/aggregator.py --dry-run --verbose

  - nombre: "Automation.com"
    url: "https://www.automation.com/en-us/rss/all-news.aspx"
    peso: 5
    activa: false  # URL bloqueada por Cloudflare/anti-bot — pendiente verificar feed real

  - nombre: "Control Engineering"
    url: "https://www.controleng.com/feed/"
    peso: 5
    activa: false  # Devuelve HTML, no RSS — pendiente

  - nombre: "ISA Interchange"
    url: "https://blog.isa.org/rss.xml"
    peso: 4
    activa: false  # 403/HTML — pendiente

  - nombre: "The Robot Report"
    url: "https://www.therobotreport.com/feed/"
    peso: 4
    activa: false  # Devuelve HTML — pendiente

  - nombre: "Manufacturing.net"
    url: "https://www.manufacturing.net/rss/all"
    peso: 3
    activa: false  # URL incorrecta — pendiente

  - nombre: "Rockwell Automation Blog"
    url: "https://www.rockwellautomation.com/en-us/company/news/blogs/jcr:content.feed"
    peso: 2
    activa: false  # URL incierta — pendiente verificar

# Configuración global del agregador.
config:
  max_noticias_por_run: 2         # calidad > volumen: pocas piezas de análisis original (750+ pal) por run
  max_por_fuente: 1               # Máx noticias tomadas de la misma fuente en un run (evita monotema)
  modelo: "claude-haiku-4-5"      # Haiku 4.5 para volumen alto y costo bajo
  # User-agent de navegador real — muchos sitios bloquean UAs "raros".
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
